<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { background: #0D1B2A; padding: 24px; }
.stack { display: flex; flex-direction: column; gap: 16px; }
.item { border-bottom: 1px solid rgba(172,198,233,0.08); padding-bottom: 14px; }
.item:last-child { border-bottom: none; padding-bottom: 0; }
.label { font-family: 'Space Mono', monospace; font-size: 10px; color: #4A6F8C; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="stack">
  <div class="item">
    <div class="label">hero · Space Grotesk 300 · 64px · −0.03em</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:300;letter-spacing:-0.03em;color:#fff;line-height:1.1">Stream money.</div>
  </div>
  <div class="item">
    <div class="label">h1 · Space Grotesk 700 · 48px · −0.03em</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:700;letter-spacing:-0.03em;color:#fff;line-height:1.15">Streaming subscriptions</div>
  </div>
  <div class="item">
    <div class="label">h2 · Space Grotesk 700 · 32px · −0.03em</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:-0.03em;color:#fff">Merchant Dashboard</div>
  </div>
  <div class="item">
    <div class="label">h3 · Space Grotesk 500 · 24px</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:500;color:#fff">Manage your plans</div>
  </div>
  <div class="item">
    <div class="label">h4 · Space Grotesk 500 · 20px</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:500;color:#ACC6E9">Active streams overview</div>
  </div>
</div>
</body>
</html>
