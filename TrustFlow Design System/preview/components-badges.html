<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { background: #0D1B2A; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
.label-mono { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #C9893A; }
.section { display: flex; flex-direction: column; gap: 8px; }
.sect-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #4A6F8C; letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;gap:14px">
  <div class="section">
    <div class="sect-label">Stream Status</div>
    <div class="row">
      <span class="badge" style="background:rgba(76,175,125,0.15);color:#4CAF7D">Active</span>
      <span class="badge" style="background:rgba(201,137,58,0.15);color:#C9893A">Paused</span>
      <span class="badge" style="background:rgba(74,111,140,0.2);color:#7A9FC4">Cancelled</span>
      <span class="badge" style="background:rgba(74,111,140,0.2);color:#7A9FC4">Inactive</span>
    </div>
  </div>
  <div class="section">
    <div class="sect-label">Dispute Status</div>
    <div class="row">
      <span class="badge" style="background:rgba(201,137,58,0.2);color:#C9893A">Open</span>
      <span class="badge" style="background:rgba(56,152,236,0.15);color:#3898EC">Awaiting Arbitration</span>
      <span class="badge" style="background:rgba(74,111,140,0.15);color:#7A9FC4">Settled</span>
    </div>
  </div>
  <div class="section">
    <div class="sect-label">Monospace Category Labels</div>
    <div class="row">
      <span class="label-mono">{STREAMING}</span>
      <span class="label-mono">{USDC}</span>
      <span class="label-mono">{ARC NETWORK}</span>
      <span class="label-mono">{PER-SECOND}</span>
      <span class="label-mono">{TRUSTFLOW}</span>
    </div>
  </div>
  <div class="section">
    <div class="sect-label">Section Headers (dispute inbox)</div>
    <div class="row">
      <span style="font-size:13px;font-weight:500;color:#C9893A">Open (2)</span>
      <span style="font-size:13px;font-weight:500;color:#3898EC">Responded (1)</span>
      <span style="font-size:13px;font-weight:500;color:#7A9FC4">Settled (5)</span>
    </div>
  </div>
</div>
</body>
</html>
