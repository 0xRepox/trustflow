<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { background: #0D1B2A; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
.row { display: flex; gap: 16px; align-items: stretch; }
.panel { flex: 1; border-radius: 12px; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
.tag { font-family: 'Space Mono', monospace; font-size: 10px; color: #4A6F8C; letter-spacing: 0.1em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="row">
  <div class="panel" style="background:#0F2236;border:1px solid rgba(172,198,233,0.15)">
    <div class="tag">logo-dark · on dark</div>
    <img src="../assets/logo-dark.svg" style="height:36px;max-width:180px">
  </div>
  <div class="panel" style="background:#f0f4f8;border:1px solid #d0d8e4">
    <div class="tag" style="color:#7A9FC4">logo-light · on light</div>
    <img src="../assets/logo-light.svg" style="height:36px;max-width:180px">
  </div>
  <div class="panel" style="background:#0F2236;border:1px solid rgba(172,198,233,0.15);flex:0 0 100px">
    <div class="tag">icon mark</div>
    <img src="../assets/icon.svg" style="height:48px;width:48px">
  </div>
  <div class="panel" style="background:#0F2236;border:1px solid rgba(172,198,233,0.15);flex:0 0 80px">
    <div class="tag">favicon</div>
    <img src="../assets/favicon.svg" style="height:32px;width:32px">
  </div>
</div>
</body>
</html>
