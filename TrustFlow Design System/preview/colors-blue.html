<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { background: #0D1B2A; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
.row { display: flex; gap: 10px; }
.swatch { flex: 1; border-radius: 8px; padding: 14px 12px; display: flex; flex-direction: column; gap: 6px; min-height: 90px; }
.name { font-size: 11px; font-family: 'Space Mono', monospace; color: rgba(255,255,255,0.7); }
.hex  { font-size: 12px; font-family: 'Space Mono', monospace; color: rgba(255,255,255,0.9); font-weight: 500; }
.role { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:#ACC6E9">
    <span class="name">--color-blue-soft</span>
    <span class="hex" style="color:#0D1B2A">#ACC6E9</span>
    <span class="role" style="color:#2F578C">Highlights, icons, secondary text</span>
  </div>
  <div class="swatch" style="background:#3898EC">
    <span class="name">--color-blue-vivid</span>
    <span class="hex">#3898EC</span>
    <span class="role">CTAs, links, primary actions</span>
  </div>
  <div class="swatch" style="background:#2F578C">
    <span class="name">--color-blue-deep</span>
    <span class="hex">#2F578C</span>
    <span class="role">Dark accents, borders</span>
  </div>
  <div class="swatch" style="background:#7A9FC4">
    <span class="name">--color-blue-muted</span>
    <span class="hex" style="color:#0D1B2A">#7A9FC4</span>
    <span class="role" style="color:#162F4A">Subtext, descriptions</span>
  </div>
</div>
</body>
</html>
