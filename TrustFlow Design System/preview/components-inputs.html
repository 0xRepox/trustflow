<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=DM+Sans:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { background: #0D1B2A; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
.row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
.section { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 160px; }
.sect-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #4A6F8C; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
label { font-size: 13px; color: #7A9FC4; font-family: 'DM Sans', sans-serif; display: block; margin-bottom: 6px; }
input, select {
  width: 100%;
  background: #162F4A;
  border: 1px solid rgba(172,198,233,0.2);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: #fff;
  outline: none;
}
input::placeholder { color: #4A6F8C; }
input:focus { border-color: rgba(56,152,236,0.5); box-shadow: 0 0 0 2px rgba(56,152,236,0.1); }
.input-prefix-wrap { position: relative; }
.prefix { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #7A9FC4; font-size: 13px; }
.input-prefix-wrap input { padding-left: 22px; }
.error-input { border-color: rgba(224,85,85,0.5) !important; }
.error-msg { font-size: 11px; color: #E05555; margin-top: 4px; font-family: 'DM Sans', sans-serif; }
</style>
</head>
<body>
<div class="row">
  <div class="section">
    <div class="sect-label">Text Input</div>
    <label>Monthly price (USDC)</label>
    <div class="input-prefix-wrap">
      <span class="prefix">$</span>
      <input type="number" placeholder="e.g. 29.99" value="">
    </div>
  </div>
  <div class="section">
    <div class="sect-label">Input · Focus</div>
    <label>Grace period (days)</label>
    <input type="number" placeholder="0" style="border-color:rgba(56,152,236,0.5);box-shadow:0 0 0 2px rgba(56,152,236,0.1)" value="7">
  </div>
  <div class="section">
    <div class="sect-label">Select</div>
    <label>Dispute policy</label>
    <select>
      <option>None</option>
      <option>Arbitration</option>
    </select>
  </div>
  <div class="section">
    <div class="sect-label">Input · Error</div>
    <label>Evidence</label>
    <input class="error-input" type="text" placeholder="Evidence text…" value="">
    <div class="error-msg">Evidence text is required to respond.</div>
  </div>
</div>
</body>
</html>
