<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=DM+Sans:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { background: #0D1B2A; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
.row { display: flex; gap: 12px; align-items: flex-start; }

.card { background: #0F2236; border: 1px solid rgba(172,198,233,0.15); border-radius: 12px; padding: 20px; flex: 1; }
.card-hover { background: #0F2236; border: 1px solid rgba(56,152,236,0.35); border-radius: 12px; padding: 20px; flex: 1; box-shadow: 0 0 24px rgba(56,152,236,0.1); }
.card-elevated { background: #162F4A; border: 1px solid rgba(172,198,233,0.12); border-radius: 12px; padding: 20px; flex: 1; }
.card-warn { background: #0F2236; border: 1px solid rgba(201,137,58,0.35); border-radius: 12px; padding: 16px; flex: 1; }
.card-title { font-size: 14px; font-weight: 500; color: #fff; }
.card-sub { font-size: 12px; color: #7A9FC4; margin-top: 4px; font-family: 'DM Sans', sans-serif; }
.tag { font-family: 'Space Mono', monospace; font-size: 9px; color: #4A6F8C; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="row">
  <div style="display:flex;flex-direction:column;gap:6px;flex:1">
    <div class="tag">default</div>
    <div class="card">
      <div class="card-title">Manage Plans</div>
      <div class="card-sub">3 plans created</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;flex:1">
    <div class="tag">hover / active</div>
    <div class="card-hover">
      <div class="card-title">View Streams</div>
      <div class="card-sub">12 total streams</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;flex:1">
    <div class="tag">elevated</div>
    <div class="card-elevated">
      <div class="card-title">Total Earned</div>
      <div style="font-size:26px;font-weight:600;color:#fff;margin-top:6px;letter-spacing:-0.02em">$1,204.50</div>
      <div class="card-sub">USDC</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;flex:1">
    <div class="tag">warning</div>
    <div class="card-warn">
      <div class="card-title" style="color:#C9893A">Open dispute</div>
      <div class="card-sub">Frozen: 29.99 USDC</div>
    </div>
  </div>
</div>
</body>
</html>
