<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { background: #0D1B2A; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.label { font-family: 'Space Mono', monospace; font-size: 10px; color: #4A6F8C; letter-spacing: 0.06em; text-transform: uppercase; }
.section { display: flex; flex-direction: column; gap: 8px; }
.divider { width: 1px; background: rgba(172,198,233,0.12); align-self: stretch; margin: 0 4px; }

button {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  outline: none;
}
.btn-primary { background: #3898EC; color: #fff; border-radius: 8px; padding: 8px 18px; }
.btn-primary:hover { background: #5AABF0; }
.btn-primary-lg { background: #3898EC; color: #fff; border-radius: 12px; padding: 12px 24px; font-size: 14px; }
.btn-secondary { background: #162F4A; color: #ACC6E9; border-radius: 8px; padding: 8px 18px; border: 1px solid rgba(172,198,233,0.2); }
.btn-secondary:hover { border-color: rgba(56,152,236,0.4); }
.btn-ghost { background: transparent; color: #7A9FC4; border-radius: 8px; padding: 8px 14px; border: 1px solid rgba(172,198,233,0.15); }
.btn-danger { background: transparent; color: #E05555; border-radius: 6px; padding: 6px 12px; font-size: 12px; }
.btn-disabled { background: #3898EC; color: #fff; border-radius: 8px; padding: 8px 18px; opacity: 0.4; cursor: not-allowed; }
.btn-warn { background: #92600F; color: #fff; border-radius: 8px; padding: 8px 18px; font-size: 13px; }
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;gap:16px">
  <div class="section">
    <div class="label">Primary</div>
    <div class="row">
      <button class="btn-primary">Connect Wallet</button>
      <button class="btn-primary-lg">Subscribe · $29.99 USDC</button>
      <button class="btn-disabled">Waiting…</button>
    </div>
  </div>
  <div class="section">
    <div class="label">Secondary / Ghost / Destructive</div>
    <div class="row">
      <button class="btn-secondary">Copy link</button>
      <button class="btn-ghost">Cancel</button>
      <button class="btn-danger">Deactivate</button>
      <button class="btn-warn">Switch to Arc Testnet</button>
    </div>
  </div>
  <div class="section">
    <div class="label">Segment / Toggle (deposit selector)</div>
    <div class="row">
      <div style="display:flex;gap:6px">
        <button style="font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;background:#3898EC;color:#fff;border:1px solid #3898EC;border-radius:8px;padding:7px 18px;cursor:pointer">1mo</button>
        <button style="font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;background:#162F4A;color:#ACC6E9;border:1px solid rgba(172,198,233,0.2);border-radius:8px;padding:7px 18px;cursor:pointer">3mo</button>
        <button style="font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;background:#162F4A;color:#ACC6E9;border:1px solid rgba(172,198,233,0.2);border-radius:8px;padding:7px 18px;cursor:pointer">6mo</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
