<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; box-sizing: border-box; }
body { background: #0D1B2A; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
.row { display: flex; gap: 10px; }
.swatch { flex: 1; border-radius: 8px; padding: 16px 14px; display: flex; flex-direction: column; gap: 8px; }
.name { font-size: 11px; font-family: 'Space Mono', monospace; color: rgba(255,255,255,0.6); }
.hex  { font-size: 13px; font-family: 'Space Mono', monospace; font-weight: 500; }
.badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; margin-top: 4px; width: fit-content; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:#0F2236;border:1px solid rgba(76,175,125,0.3)">
    <span class="name">--color-success</span>
    <span class="hex" style="color:#4CAF7D">#4CAF7D</span>
    <span class="badge" style="background:rgba(76,175,125,0.15);color:#4CAF7D">Active</span>
  </div>
  <div class="swatch" style="background:#0F2236;border:1px solid rgba(201,137,58,0.3)">
    <span class="name">--color-warning / --color-accent-label</span>
    <span class="hex" style="color:#C9893A">#C9893A</span>
    <span class="badge" style="background:rgba(201,137,58,0.15);color:#C9893A">{STREAMING}</span>
  </div>
  <div class="swatch" style="background:#0F2236;border:1px solid rgba(224,85,85,0.3)">
    <span class="name">--color-error</span>
    <span class="hex" style="color:#E05555">#E05555</span>
    <span class="badge" style="background:rgba(224,85,85,0.15);color:#E05555">Insufficient balance</span>
  </div>
</div>
</body>
</html>
