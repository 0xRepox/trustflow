<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ── TOKENS ─────────────────────────────────────────── */
const C = {
  bg0:'#060E18', bg1:'#08111C', bg2:'#0C1A2C', bg3:'#0F2035', bg4:'#132640',
  border:'rgba(172,198,233,0.09)', borderHi:'rgba(56,152,236,0.35)',
  blue:'#3898EC', blueSoft:'#ACC6E9', blueMuted:'#7A9FC4', blueDeep:'#2F578C',
  fg1:'#FFFFFF', fg2:'#ACC6E9', fg3:'#7A9FC4', fg4:'#4A6F8C',
  orange:'#C9893A', green:'#4CAF7D', red:'#E05555', yellow:'#D4A832',
};

/* ── SVG CHART HELPERS ──────────────────────────────── */
function smoothCurve(values, W, H, pad=8) {
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => ({
    x: pad + (i / (values.length - 1)) * (W - pad * 2),
    y: H - pad - ((v - min) / range) * (H - pad * 2),
  }));
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const prev = pts[i - 1] || pts[i];
    const next = pts[i + 2] || pts[i + 1];
    const cp1x = pts[i].x + (pts[i+1].x - prev.x) / 5;
    const cp1y = pts[i].y + (pts[i+1].y - prev.y) / 5;
    const cp2x = pts[i+1].x - (next.x - pts[i].x) / 5;
    const cp2y = pts[i+1].y - (next.y - pts[i].y) / 5;
    d += ` C ${cp1x.toFixed(1)} ${cp1y.toFixed(1)} ${cp2x.toFixed(1)} ${cp2y.toFixed(1)} ${pts[i+1].x.toFixed(1)} ${pts[i+1].y.toFixed(1)}`;
  }
  const area = d + ` L ${pts[pts.length-1].x} ${H} L ${pts[0].x} ${H} Z`;
  return { d, area, pts };
}

/* ── ARC DECOR ──────────────────────────────────────── */
function ArcDecor({ style }) {
  return (
    <svg viewBox="0 0 400 200" fill="none" style={{ position:'absolute', pointerEvents:'none', ...style }}>
      <path d="M-30 180 Q150 -40 430 120" stroke="rgba(56,152,236,0.06)" strokeWidth="1.5" fill="none"/>
      <path d="M-30 210 Q150 -10 430 150" stroke="rgba(172,198,233,0.03)" strokeWidth="1" fill="none"/>
      <circle cx="415" cy="118" r="2.5" fill="rgba(56,152,236,0.25)"/>
      <circle cx="-15" cy="180" r="1.5" fill="rgba(172,198,233,0.2)"/>
    </svg>
  );
}

/* ── CARD WRAPPER ──────────────────────────────────── */
function Card({ children, style={}, span, glow }) {
  return (
    <div style={{
      background: C.bg2,
      border: `1px solid ${glow ? C.borderHi : C.border}`,
      borderRadius: 16, overflow:'hidden', position:'relative',
      boxShadow: glow ? `0 0 32px rgba(56,152,236,0.08)` : 'none',
      animation: 'fadeUp 0.4s ease both',
      ...style,
    }}>
      {children}
    </div>
  );
}

function CardHeader({ title, tag, right, sub }) {
  return (
    <div style={{ padding:'18px 20px 0', display:'flex', alignItems:'flex-start', justifyContent:'space-between' }}>
      <div>
        {tag && <div style={{ fontFamily:'Space Mono', fontSize:9, color:C.orange, letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:4 }}>{tag}</div>}
        <div style={{ fontFamily:'Space Grotesk', fontSize:13, fontWeight:500, color:C.fg3 }}>{title}</div>
        {sub && <div style={{ fontFamily:'DM Sans', fontSize:11, color:C.fg4, marginTop:2 }}>{sub}</div>}
      </div>
      {right && <div style={{ flexShrink:0, marginLeft:12 }}>{right}</div>}
    </div>
  );
}

function PeriodBadge({ label='Apr 2026' }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:5, background:C.bg4, border:`1px solid ${C.border}`, borderRadius:6, padding:'4px 9px', cursor:'pointer' }}>
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="2" width="8" height="7" rx="1.5" stroke={C.fg4} strokeWidth="1"/><path d="M3 1v2M7 1v2M1 5h8" stroke={C.fg4} strokeWidth="1"/></svg>
      <span style={{ fontFamily:'Space Mono', fontSize:9, color:C.fg4, letterSpacing:'0.04em' }}>{label}</span>
      <span style={{ color:C.fg4, fontSize:8 }}>▾</span>
    </div>
  );
}

function Delta({ val, suffix='%' }) {
  const pos = val >= 0;
  return (
    <span style={{ fontFamily:'DM Sans', fontSize:11, fontWeight:500, color: pos ? C.green : C.red, background: pos ? 'rgba(76,175,125,0.1)' : 'rgba(224,85,85,0.1)', borderRadius:4, padding:'2px 6px' }}>
      {pos ? '↑' : '↓'} {Math.abs(val)}{suffix}
    </span>
  );
}

/* ── LIVE TICKER ─────────────────────────────────────── */
function LiveTicker({ start = 1204.50 }) {
  const [val, setVal] = useState(start);
  useEffect(() => {
    const t = setInterval(() => setVal(v => +(v + 0.000011 * 12).toFixed(6)), 91);
    return () => clearInterval(t);
  }, []);
  return <span style={{ fontVariantNumeric:'tabular-nums' }}>${val.toFixed(2)}</span>;
}

/* ── AREA CHART ──────────────────────────────────────── */
const MONTHS = ['Oct','Nov','Dec','Jan','Feb','Mar','Apr'];
const DEPOSITED = [220, 310, 400, 520, 650, 790, 980];
const CLAIMED   = [160, 230, 310, 400, 510, 620, 760];
const CLAIMABLE = [60,  80, 90, 120, 140, 170, 220];

function AreaChart() {
  const W = 560, H = 130;
  const dep = smoothCurve(DEPOSITED, W, H);
  const clm = smoothCurve(CLAIMED,   W, H);
  const id = useRef(Math.random().toString(36).slice(2));

  const yLabels = ['$0','$250','$500','$750','$1k'];
  const maxVal = Math.max(...DEPOSITED);

  return (
    <div style={{ padding:'20px 20px 14px' }}>
      {/* 3 top metrics */}
      <div style={{ display:'flex', gap:32, marginBottom:16 }}>
        {[
          { label:'Total deposited', val:`$${DEPOSITED[6].toFixed(0)}`, delta:24, color: C.blue },
          { label:'Claimed',         val:`$${CLAIMED[6].toFixed(0)}`,   delta:18, color: C.blueSoft },
          { label:'Claimable now',   val:`$${CLAIMABLE[6].toFixed(0)}`, delta:8,  color: C.green },
        ].map(({ label, val, delta, color }) => (
          <div key={label}>
            <div style={{ fontFamily:'DM Sans', fontSize:11, color:C.fg4, marginBottom:3 }}>{label}</div>
            <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
              <span style={{ fontFamily:'Space Grotesk', fontSize:22, fontWeight:700, color:'#fff', letterSpacing:'-0.03em' }}>{val}</span>
              <Delta val={delta}/>
            </div>
          </div>
        ))}
      </div>

      {/* SVG chart */}
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow:'visible' }}>
        <defs>
          <linearGradient id={`dep-${id.current}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={C.blue} stopOpacity=".25"/>
            <stop offset="100%" stopColor={C.blue} stopOpacity="0"/>
          </linearGradient>
          <linearGradient id={`clm-${id.current}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={C.blueSoft} stopOpacity=".15"/>
            <stop offset="100%" stopColor={C.blueSoft} stopOpacity="0"/>
          </linearGradient>
        </defs>

        {/* Grid lines */}
        {[0,.25,.5,.75,1].map((t,i) => (
          <line key={i} x1={8} y1={H - 8 - t*(H-16)} x2={W-8} y2={H - 8 - t*(H-16)}
            stroke="rgba(172,198,233,0.06)" strokeWidth="1" strokeDasharray="4 4"/>
        ))}

        {/* Areas */}
        <path d={dep.area} fill={`url(#dep-${id.current})`}/>
        <path d={clm.area} fill={`url(#clm-${id.current})`}/>

        {/* Lines */}
        <path d={dep.d} stroke={C.blue} strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        <path d={clm.d} stroke={C.blueSoft} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="5 3"/>

        {/* Dots on last point */}
        <circle cx={dep.pts[6].x} cy={dep.pts[6].y} r="3.5" fill={C.blue} stroke={C.bg2} strokeWidth="2"/>
        <circle cx={clm.pts[6].x} cy={clm.pts[6].y} r="3" fill={C.blueSoft} stroke={C.bg2} strokeWidth="2"/>

        {/* Month labels */}
        {MONTHS.map((m, i) => {
          const x = 8 + (i / 6) * (W - 16);
          return <text key={m} x={x} y={H + 14} textAnchor="middle" fontFamily="Space Mono" fontSize="9" fill={C.fg4}>{m}</text>;
        })}
      </svg>

      {/* Legend */}
      <div style={{ display:'flex', gap:16, marginTop:10 }}>
        {[['Deposited', C.blue, 'solid'], ['Claimed', C.blueSoft, 'dashed']].map(([l, color, style]) => (
          <div key={l} style={{ display:'flex', alignItems:'center', gap:5 }}>
            <svg width="18" height="2"><line x1="0" y1="1" x2="18" y2="1" stroke={color} strokeWidth="1.5" strokeDasharray={style==='dashed' ? '4 2' : 'none'}/></svg>
            <span style={{ fontFamily:'DM Sans', fontSize:11, color:C.fg4 }}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── DONUT CHART ─────────────────────────────────────── */
function DonutChart() {
  const R = 52, cx = 70, cy = 70;
  const circ = 2 * Math.PI * R;
  const segments = [
    { label:'Active',    val:9,  pct:75, color:C.green,    offset:0 },
    { label:'Paused',    val:2,  pct:17, color:C.yellow,   offset:75 },
    { label:'Cancelled', val:1,  pct:8,  color:C.blueDeep, offset:92 },
  ];

  return (
    <div style={{ padding:'18px 20px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:20 }}>
        <svg width={140} height={140} viewBox="0 0 140 140" style={{ flexShrink:0 }}>
          {/* Background ring */}
          <circle cx={cx} cy={cy} r={R} fill="none" stroke={C.bg4} strokeWidth="14"/>
          {segments.map(s => (
            <circle key={s.label} cx={cx} cy={cy} r={R} fill="none"
              stroke={s.color} strokeWidth="14"
              strokeDasharray={`${(s.pct/100)*circ} ${circ}`}
              strokeDashoffset={-((s.offset/100)*circ)}
              strokeLinecap="butt"
              transform={`rotate(-90 ${cx} ${cy})`}
              style={{ transition:'stroke-dasharray 0.6s ease' }}
            />
          ))}
          <text x={cx} y={cy-6} textAnchor="middle" fontFamily="Space Grotesk" fontWeight="700" fontSize="20" fill="#fff">12</text>
          <text x={cx} y={cy+10} textAnchor="middle" fontFamily="DM Sans" fontSize="10" fill={C.fg4}>streams</text>
        </svg>

        <div style={{ flex:1, display:'flex', flexDirection:'column', gap:10 }}>
          {segments.map(s => (
            <div key={s.label}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                  <span style={{ width:6, height:6, borderRadius:'50%', background:s.color, display:'block' }}/>
                  <span style={{ fontFamily:'DM Sans', fontSize:12, color:C.fg3 }}>{s.label}</span>
                </div>
                <span style={{ fontFamily:'Space Grotesk', fontSize:12, fontWeight:600, color:'#fff' }}>{s.val}</span>
              </div>
              <div style={{ height:3, background:C.bg4, borderRadius:2, overflow:'hidden' }}>
                <div style={{ width:`${s.pct}%`, height:'100%', background:s.color, borderRadius:2 }}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── BAR CHART (plan revenue) ────────────────────────── */
const PLAN_DATA = [
  { plan:'#1 $9.99', monthly:[40,40,40,40,40,40,40], color:'rgba(172,198,233,0.5)' },
  { plan:'#2 $29.99', monthly:[90,120,150,180,210,240,270], color:C.blue },
  { plan:'#3 $99', monthly:[0,0,99,99,198,297,396], color:'rgba(56,152,236,0.4)' },
];

function PlanBars() {
  const W=340, H=100, barW=8, groupGap=38;
  const maxVal = 430;

  return (
    <div style={{ padding:'0 20px 16px' }}>
      <svg width="100%" viewBox={`0 0 ${W} ${H+20}`} style={{ overflow:'visible' }}>
        {/* Grid */}
        {[0,.5,1].map((t,i) => (
          <line key={i} x1={0} y1={H - t*H} x2={W} y2={H - t*H}
            stroke="rgba(172,198,233,0.05)" strokeWidth="1"/>
        ))}
        {/* Bars */}
        {MONTHS.map((m, mi) => {
          const gx = mi * groupGap + 14;
          return (
            <g key={m}>
              {PLAN_DATA.map((p, pi) => {
                const v = p.monthly[mi];
                const bh = (v / maxVal) * H;
                return (
                  <rect key={pi}
                    x={gx + pi * (barW + 2)} y={H - bh}
                    width={barW} height={bh}
                    rx="2" fill={p.color}
                  />
                );
              })}
              <text x={gx + barW + 2} y={H+14} textAnchor="middle" fontFamily="Space Mono" fontSize="8" fill={C.fg4}>{m}</text>
            </g>
          );
        })}
        {/* Y axis labels */}
        {['$0','$200','$430'].map((l, i) => (

function StreamRateCard() {
  const [rate, setRate] = useState(0.000132);
  useEffect(() => {

    return () => clearInterval(t);
  }, []);

  const rows = [
    { label:'Revenue / hour',  val:`$${(rate * 3600).toFixed(4)}`,  delta:'+12%', pos:true },
    { label:'Revenue / day',   val:`$${(rate * 86400).toFixed(3)}`,  delta:'+12%', pos:true },
    { label:'Revenue / month', val:`$${(rate * 2592000).toFixed(2)}`, delta:'+12%', pos:true },
    { label:'Active streams',  val:'9 of 12', delta:'+1', pos:true },

  return (

      <div style={{ height:1, background:C.border, margin:'4px 0' }}/>
      {rows.map(r => (
        <div key={r.label} style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontFamily:'DM Sans', fontSize:12, color:C.fg3 }}>{r.label}</span>

            <span style={{ fontFamily:'Space Grotesk',fontSize:13,fontWeight:600,color:g.color }}>{g.label}</span>
            <span style={{ fontFamily:'Space Mono',fontSize:10,background:`${g.color}18`,color:g.color,borderRadius:9999,padding:'1px 8px' }}>{g.items.length}</span>
          </div>
          {g.items.map(d=>(
            <Card key={d.id} style={{ marginBottom:10,padding:'18px 20px',opacity:d.status==='Settled'?0.5:1,border:`1px solid ${borderMap[d.status]}` }}>
              <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10 }}>
                <div style={{ display:'flex',alignItems:'center',gap:12 }}>
                  <span style={{ fontFamily:'Space Mono',fontSize:12,color:C.blueMuted }}>Dispute #{d.id} · Stream #{d.streamId}</span>

                  <span style={{ background:badgeMap[d.status].bg,color:badgeMap[d.status].c,borderRadius:9999,padding:'3px 10px',fontFamily:'Space Grotesk',fontSize:11,fontWeight:500 }}>{d.verdict?`Settled — ${d.verdict}`:badgeMap[d.status].label}</span>
                </div>
              </div>
              <div style={{ fontFamily:'Space Mono',fontSize:11,color:C.fg4,marginBottom:d.status==='Open'?12:0 }}>Subscriber: {d.subscriber}…</div>
              {d.status==='Open'&&(
                <div style={{ display:'flex',gap:8 }}>
                  <input placeholder="Evidence text (hashed onchain)" value={evidence[d.id]||''} onChange={e=>setEvidence(ev=>({...ev,[d.id]:e.target.value}))}
                    style={{ flex:1,background:C.bg3,border:`1px solid rgba(172,198,233,0.18)`,borderRadius:8,padding:'8px 12px',fontFamily:'DM Sans',fontSize:12,color:'#fff',outline:'none' }}
                    onFocus={e=>e.target.style.borderColor='rgba(56,152,236,0.45)'} onBlur={e=>e.target.style.borderColor='rgba(172,198,233,0.18)'}/>
                  <button onClick={()=>evidence[d.id]&&setDisputes(ds=>ds.map(x=>x.id===d.id?{...x,status:'Responded'}:x))} style={{ background:C.blue,border:'none',borderRadius:8,padding:'8px 16px',fontFamily:'Space Grotesk',fontSize:12,fontWeight:600,color:'#fff',cursor:'pointer',whiteSpace:'nowrap' }}>Respond</button>
                  <button onClick={()=>setDisputes(ds=>ds.map(x=>x.id===d.id?{...x,status:'Settled',verdict:'Subscriber'}:x))} style={{ background:C.bg3,border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 14px',fontFamily:'Space Grotesk',fontSize:12,color:C.fg3,cursor:'pointer',whiteSpace:'nowrap' }}>Default Settle</button>
                </div>
              )}
            </Card>
          ))}
        </div>
      ))}
    </div>
  );
}

/* ── DOCS PAGE ───────────────────────────────────────── */

      <h1 style={{ fontFamily:'Space Grotesk',fontSize:24,fontWeight:700,color:'#fff',letterSpacing:'-0.025em',marginBottom:24 }}>Integration Guide</h1>

        ['{QUICKSTART}','How streaming works','Subscribers deposit USDC upfront. Funds stream per-second to your address — you can claim accrued revenue at any time. When a subscriber cancels, they receive an instant pro-rata refund of unconsumed funds.'],

        ['{DISPUTES}','Handling disputes','When a subscriber raises a dispute, the contested amount is frozen. Respond with hashed evidence within the grace period, or let it default-settle.'],
        ['{NETWORK}','Arc Network','Chain ID: 5042002 · USDC: 0x3600…0000 · Explorer: testnet.arcscan.app · Sub-second block times mean cancellations and claims settle instantly.'],

        <div key={tag} style={{ borderBottom:i<arr.length-1?`1px solid ${C.border}`:'none',paddingBottom:24,marginBottom:24 }}>
          <div style={{ fontFamily:'Space Mono',fontSize:9,color:C.orange,letterSpacing:'0.12em',marginBottom:6 }}>{tag}</div>
          <div style={{ fontFamily:'Space Grotesk',fontSize:15,fontWeight:600,color:C.blueSoft,marginBottom:8 }}>{title}</div>

        </div>
      ))}

}

/* ── SUBSCRIBE PAGE ──────────────────────────────────── */
function SubscribePage() {
  const [months, setMonths] = useState(1);
  const [step, setStep] = useState('idle');
  const monthly = 29.99, balance = 94.50;
  const deposit = (monthly * months).toFixed(2);
  const hasBalance = balance >= monthly * months;

  function go() { if(!hasBalance)return; setStep('approving'); setTimeout(()=>setStep('subscribing'),1600); setTimeout(()=>setStep('done'),3200); }

  if (step==='done') return (
    <div style={{ height:'100%',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden' }}>
      <ArcDecor style={{ width:600,top:0,left:0 }}/>
      <Card style={{ padding:'44px 40px',maxWidth:420,width:'100%',textAlign:'center',border:'1px solid rgba(76,175,125,0.4)',boxShadow:'0 0 60px rgba(76,175,125,0.06)',zIndex:1 }}>
        <div style={{ width:56,height:56,borderRadius:'50%',background:'rgba(76,175,125,0.15)',border:'1px solid rgba(76,175,125,0.4)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',fontSize:22,color:C.green }}>✓</div>
        <h2 style={{ fontFamily:'Space Grotesk',fontSize:22,fontWeight:700,color:'#fff',margin:'0 0 10px',letterSpacing:'-0.02em' }}>Subscribed!</h2>
        <p style={{ fontFamily:'DM Sans',fontSize:13,color:C.fg3,lineHeight:1.65,margin:'0 0 6px' }}>Your stream is live. You're being charged</p>
        <p style={{ fontFamily:'Space Mono',fontSize:13,color:C.blue,margin:'0 0 20px' }}>$0.000011 USDC/s</p>
        <p style={{ fontFamily:'DM Sans',fontSize:12,color:C.fg4 }}>Cancel anytime · no chargebacks</p>
        <p style={{ fontFamily:'Space Mono',fontSize:10,color:C.fg4,marginTop:16 }}>Stream ID: 42</p>
        <button onClick={()=>setStep('idle')} style={{ marginTop:20,background:'none',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 18px',fontFamily:'Space Grotesk',fontSize:12,color:C.fg3,cursor:'pointer' }}>Start over</button>
      </Card>
    </div>
  );

  return (
    <div style={{ height:'100%',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden' }}>
      <ArcDecor style={{ width:700,top:-40,left:-80,opacity:0.8 }}/>
      <Card style={{ padding:'36px 32px',maxWidth:440,width:'100%',zIndex:1,boxShadow:`0 24px 80px rgba(0,0,0,0.5)` }}>
        <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:28 }}>
          <div style={{ display:'flex',alignItems:'center',gap:8 }}>
            <img src={window.__resources.iconSvg} style={{ width:22,height:22 }}/>
            <span style={{ fontFamily:'Space Grotesk',fontWeight:700,fontSize:14,color:'#fff' }}>TrustFlow</span>
          </div>
          <span style={{ fontFamily:'Space Mono',fontSize:9,color:C.fg4,letterSpacing:'0.08em' }}>PLAN #2</span>
        </div>
        <div style={{ marginBottom:20 }}>
          <div style={{ display:'flex',alignItems:'baseline',gap:4 }}>
            <span style={{ fontFamily:'Space Grotesk',fontWeight:700,fontSize:42,color:'#fff',letterSpacing:'-0.04em' }}>${monthly}</span>
            <span style={{ fontFamily:'DM Sans',fontSize:16,color:C.fg3 }}>/mo</span>
          </div>
          <p style={{ fontFamily:'DM Sans',fontSize:12,color:C.fg3,marginTop:4 }}>Billed per-second · <span style={{ fontFamily:'Space Mono',fontSize:11,color:C.blue }}>$0.000011 USDC/s</span> · Cancel anytime</p>
        </div>
        <div style={{ height:1,background:C.border,margin:'0 0 20px' }}/>
        <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20 }}>
          {[['Daily',`$${(monthly/30).toFixed(2)}`],['Monthly',`$${monthly}`]].map(([l,v])=>(
            <div key={l} style={{ background:C.bg3,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px' }}>
              <div style={{ fontFamily:'DM Sans',fontSize:11,color:C.fg4 }}>{l}</div>
              <div style={{ fontFamily:'Space Grotesk',fontSize:16,fontWeight:600,color:'#fff',marginTop:4 }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ marginBottom:20 }}>
          <div style={{ fontFamily:'Space Grotesk',fontSize:13,fontWeight:500,color:C.fg2,marginBottom:8 }}>Initial deposit <span style={{ fontWeight:400,color:C.fg4,fontSize:12 }}>(months upfront)</span></div>
          <div style={{ display:'flex',gap:8,marginBottom:10 }}>
            {[1,3,6].map(m=><button key={m} onClick={()=>setMonths(m)} style={{ flex:1,padding:'9px 0',borderRadius:10,cursor:'pointer',fontFamily:'Space Grotesk',fontSize:13,fontWeight:600,background:months===m?C.blue:C.bg3,border:`1px solid ${months===m?C.blue:C.border}`,color:months===m?'#fff':C.fg3,transition:'all 0.15s' }}>{m}mo</button>)}
          </div>
          <div style={{ fontFamily:'DM Sans',fontSize:12,color:C.fg3 }}>
            Deposit: <span style={{ color:'#fff',fontWeight:600,fontFamily:'Space Grotesk' }}>${deposit} USDC</span>
            <span style={{ marginLeft:10,fontFamily:'Space Mono',fontSize:11,color:hasBalance?C.green:C.red }}>bal: ${balance.toFixed(2)}</span>
          </div>
        </div>
        <button onClick={go} disabled={step!=='idle'} style={{ width:'100%',background:step!=='idle'?C.blueDeep:C.blue,border:'none',borderRadius:12,padding:'14px',fontFamily:'Space Grotesk',fontSize:14,fontWeight:600,color:'#fff',cursor:step==='idle'?'pointer':'default',transition:'all 0.15s',marginBottom:16 }}>
          {step==='idle'&&`Subscribe · $${deposit} USDC`}
          {step==='approving'&&'① Approving USDC…'}
          {step==='subscribing'&&'② Creating stream…'}
        </button>
        <p style={{ fontFamily:'Space Mono',fontSize:9,color:C.fg4,textAlign:'center',letterSpacing:'0.06em' }}>POWERED BY TRUSTFLOW · FUNDS STREAM PER-SECOND ONCHAIN</p>
      </Card>
    </div>
  );
}

/* ── SIDEBAR ─────────────────────────────────────────── */
const NAV = [
  { id:'overview', label:'Overview', icon:<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/></svg> },
  { id:'plans',    label:'Plans',    icon:<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg> },
  { id:'streams',  label:'Streams',  icon:<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M1 8 Q4 3 8 8 Q12 13 15 8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" fill="none"/></svg> },
  { id:'disputes', label:'Disputes', icon:<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 2L14 13H2L8 2Z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" fill="none"/><path d="M8 7v2.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><circle cx="8" cy="11.5" r=".75" fill="currentColor"/></svg> },
  { id:'docs',     label:'Docs',     icon:<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="3" y="1" width="10" height="14" rx="1.5" stroke="currentColor" strokeWidth="1.5" fill="none"/><path d="M6 5h4M6 8h4M6 11h2" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg> },
];

function Sidebar({ page, setPage, openDisputes }) {
  return (
    <aside style={{ width:210,flexShrink:0,background:C.bg0,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',overflow:'hidden' }}>
      <div style={{ padding:'20px 18px 16px',borderBottom:`1px solid ${C.border}` }}>
        <div style={{ display:'flex',alignItems:'center',gap:10 }}>
          <img src={window.__resources.iconSvg} style={{ width:26,height:26 }}/>
          <div>
            <div style={{ fontFamily:'Space Grotesk',fontWeight:700,fontSize:14,color:'#fff',letterSpacing:'-0.02em' }}>TrustFlow</div>
            <div style={{ fontFamily:'Space Mono',fontSize:8,color:C.orange,letterSpacing:'0.08em',marginTop:1 }}>{'{MERCHANT}'}</div>
          </div>
        </div>
      </div>
      <div style={{ padding:'10px 10px',borderBottom:`1px solid ${C.border}` }}>
        <div style={{ display:'flex',alignItems:'center',gap:6,background:C.bg3,borderRadius:8,padding:'7px 10px',border:`1px solid rgba(56,152,236,0.15)` }}>
          <span style={{ width:5,height:5,borderRadius:'50%',background:C.green,display:'block',animation:'pulse 2s infinite',flexShrink:0 }}/>
          <span style={{ fontFamily:'Space Mono',fontSize:8,color:C.fg3,letterSpacing:'0.06em' }}>ARC TESTNET</span>
          <span style={{ fontFamily:'Space Mono',fontSize:8,color:C.fg4,marginLeft:'auto' }}>5042002</span>
        </div>
      </div>
      <nav style={{ padding:'10px 8px',flex:1 }}>
        {NAV.map(item=>{
          const active=page===item.id;
          const hasBadge=item.id==='disputes'&&openDisputes>0;
          return (
            <button key={item.id} onClick={()=>setPage(item.id)} style={{ width:'100%',display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:8,border:'none',cursor:'pointer',background:active?'rgba(56,152,236,0.1)':'transparent',color:active?C.blueSoft:C.fg4,fontFamily:'Space Grotesk',fontSize:13,fontWeight:active?500:400,marginBottom:2,transition:'all 0.15s',textAlign:'left',boxShadow:active?`inset 0 0 0 1px rgba(56,152,236,0.18)`:'none' }}>
              <span style={{ color:active?C.blue:C.fg4,flexShrink:0 }}>{item.icon}</span>
              <span>{item.label}</span>
              {hasBadge&&<span style={{ marginLeft:'auto',background:'rgba(201,137,58,0.18)',color:C.orange,borderRadius:9999,padding:'1px 7px',fontSize:10,fontFamily:'Space Mono',fontWeight:700 }}>{openDisputes}</span>}
            </button>
          );
        })}
      </nav>
      <div style={{ padding:'12px 14px',borderTop:`1px solid ${C.border}` }}>
        <div style={{ display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:C.bg3,borderRadius:8,border:`1px solid ${C.border}`,cursor:'pointer' }}>
          <div style={{ width:22,height:22,borderRadius:'50%',background:`linear-gradient(135deg, ${C.blue}, ${C.blueSoft})`,flexShrink:0 }}/>
          <div style={{ flex:1,overflow:'hidden' }}>
            <div style={{ fontFamily:'Space Mono',fontSize:10,color:C.blueSoft,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}>0x1a2b…ef12</div>
            <div style={{ fontFamily:'DM Sans',fontSize:10,color:C.fg4,marginTop:1 }}>Connected</div>
          </div>
          <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="2.5" fill={C.green}/></svg>
        </div>
      </div>
    </aside>
  );
}

/* ── APP ─────────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accentColor":"#3898EC","bgBase":"#08111C"}/*EDITMODE-END*/;

function App() {
  const [page, setPage] = useState(()=>localStorage.getItem('tf_page')||'overview');
  const [tweakOpen, setTweakOpen] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(()=>{ localStorage.setItem('tf_page',page); },[page]);
  useEffect(()=>{
    const handler=(e)=>{ if(e.data?.type==='__activate_edit_mode')setTweakOpen(true); if(e.data?.type==='__deactivate_edit_mode')setTweakOpen(false); };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',handler);
  },[]);

  const isSubscribe = page==='subscribe';
  const Pages = { overview:OverviewPage,plans:PlansPage,streams:StreamsPage,disputes:DisputesPage,docs:DocsPage,subscribe:SubscribePage };
  const PageComp = Pages[page]||OverviewPage;

  return (
    <div style={{ height:'100%',display:'flex',flexDirection:'column',background:C.bg1 }}>
      {/* Topbar */}
      <div style={{ height:36,flexShrink:0,background:C.bg0,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 18px' }}>
        <div style={{ display:'flex',alignItems:'center',gap:14 }}>
          {['ARC TESTNET EXPLORER','USDC: 0x3600…0000','BLOCK: #1,284,391'].map((t,i)=>(
            <React.Fragment key={t}>
              {i>0&&<span style={{ color:C.border }}>·</span>}
              <span style={{ fontFamily:'Space Mono',fontSize:8,color:C.fg4,letterSpacing:'0.08em' }}>{t}</span>
            </React.Fragment>
          ))}
        </div>
        <div style={{ display:'flex',gap:8 }}>
          {isSubscribe
            ? <button onClick={()=>setPage('overview')} style={{ background:'none',border:`1px solid ${C.border}`,borderRadius:5,padding:'3px 10px',fontFamily:'Space Mono',fontSize:8,color:C.fg4,cursor:'pointer',letterSpacing:'0.06em' }}>← DASHBOARD</button>
            : <button onClick={()=>setPage('subscribe')} style={{ background:'none',border:`1px solid rgba(56,152,236,0.25)`,borderRadius:5,padding:'3px 10px',fontFamily:'Space Mono',fontSize:8,color:C.blue,cursor:'pointer',letterSpacing:'0.06em' }}>PREVIEW CHECKOUT ↗</button>
          }
        </div>
      </div>

      <div style={{ flex:1,display:'flex',overflow:'hidden' }}>
        {!isSubscribe && <Sidebar page={page} setPage={setPage} openDisputes={2}/>}
        <main style={{ flex:1,overflow:'hidden',position:'relative',background:C.bg1 }}>
          <PageComp setPage={setPage}/>
        </main>
      </div>

      {tweakOpen&&(
        <div style={{ position:'fixed',bottom:20,right:20,width:210,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:16,zIndex:1000,boxShadow:'0 8px 32px rgba(0,0,0,0.6)' }}>
          <p style={{ fontFamily:'Space Mono',fontSize:9,color:C.fg4,letterSpacing:'0.1em',textTransform:'uppercase',margin:'0 0 14px' }}>Tweaks</p>
          {[{key:'accentColor',label:'Accent'},{key:'bgBase',label:'Background'}].map(({key,label})=>(
            <div key={key} style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10 }}>
              <span style={{ fontFamily:'DM Sans',fontSize:12,color:C.fg3 }}>{label}</span>
              <input type="color" value={tweaks[key]} onChange={e=>{ const n={...tweaks,[key]:e.target.value}; setTweaks(n); window.parent.postMessage({type:'__edit_mode_set_keys',edits:n},'*'); }} style={{ width:28,height:20,border:'none',borderRadius:4,cursor:'pointer',background:'none' }}/>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
