[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "paris"

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"
localhost = "http://localhost:8545"

[etherscan]
arc_testnet = { key = "${ARCSCAN_API_KEY}", url = "https://testnet.arcscan.app/api", chain = 5042002 }

[fuzz]
runs = 256

[invariant]
runs = 64
depth = 15
